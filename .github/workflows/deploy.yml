name: Build and Deploy to Aliyun ACR

on:
  push:
    branches:
      ["master"]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: nest-admin-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      IMAGE_LATEST: ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ secrets.ALIYUN_REPO }}:latest
      IMAGE_SHA: ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ secrets.ALIYUN_REPO }}:${{ github.sha }}
      DEPLOY_PATH: /opt/nest-admin
      APP_PORT: 35000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_LATEST }}
            ${{ env.IMAGE_SHA }}

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' '${{ secrets.DEPLOY_SSH_KEY }}' | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p '${{ secrets.DEPLOY_PORT }}' '${{ secrets.DEPLOY_HOST }}' >> ~/.ssh/known_hosts

      - name: Upload deploy files
        run: |
          scp -P '${{ secrets.DEPLOY_PORT }}' docker-compose.prod.yml deploy/deploy.sh '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/'

      - name: Prepare remote deploy env
        run: |
          cat > .deploy.remote.env <<EOF
          ACR_REGISTRY=${{ secrets.ALIYUN_REGISTRY }}
          ACR_USERNAME=${{ secrets.ALIYUN_USERNAME }}
          ACR_PASSWORD=${{ secrets.ALIYUN_PASSWORD }}
          DEPLOY_IMAGE=${{ env.IMAGE_SHA }}
          DEPLOY_PATH=${{ env.DEPLOY_PATH }}
          APP_PORT=${{ env.APP_PORT }}
          EOF
          scp -P '${{ secrets.DEPLOY_PORT }}' .deploy.remote.env '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/.deploy.remote.env'
          rm -f .deploy.remote.env

      - name: Deploy on server
        run: |
          ssh -p '${{ secrets.DEPLOY_PORT }}' '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' '
            set -e
            chmod +x /opt/nest-admin/deploy.sh
            set -a
            . /opt/nest-admin/.deploy.remote.env
            set +a
            bash /opt/nest-admin/deploy.sh
            rm -f /opt/nest-admin/.deploy.remote.env
          '

      - name: Deployment complete
        run: echo "✅ Docker image built, pushed, and deployed successfully."
