name: Bug 报告
description: 提交一个可复现的问题
title: '[Bug] '
labels: ['bug']
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 描述问题现象和期望行为
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 提供最小复现步骤
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 环境信息
      description: 系统、Node、pnpm 版本
    validations:
      required: true
