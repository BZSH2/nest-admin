services:
  app:
    image: ${DEPLOY_IMAGE:?DEPLOY_IMAGE is required}
    container_name: nest-admin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:35000:35000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          fetch('http://127.0.0.1:35000/api/health/ready').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
